spring:
  application:
    name: v3base

  datasource:
    url: jdbc:h2:mem:stateless_security
    username: sa
    password:
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
    show-sql: true
  h2:
    console:
      enabled: false
error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
    http-statuses:
      org.springframework.security.authorization.AuthorizationDeniedException: unauthorized
    codes:
      UsersUsernameUnique: USERS_USERNAME_UNIQUE
      RoleNameUnique: ROLE_NAME_UNIQUE
      RoleDescriptionUnique: ROLE_DESCRIPTION_UNIQUE
      PrivilegeNameUnique: PRIVILEGE_NAME_UNIQUE
      UrlsEndpointUnique: URLS_ENDPOINT_UNIQUE
springdoc:
  pathsToMatch: /api/**, /authenticate, /authenticateGoogle, /refresh-token, /register
app:
  baseHost: http://localhost:9988
  google:
    client-id: GOOGLE_CLIENT_ID.apps.googleusercontent.com
    client-secret: GOOGLE_CLIENT_SECRET
server:
  port: 9988

# Module Management Configuration
modules:
  security:
    enabled: true
  export-import:
    enabled: false
  # Add more module configurations as needed

security:
  policy:
    drift:
      enabled: true
      fail-on-drift: false

